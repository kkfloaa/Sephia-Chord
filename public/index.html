<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Sephia Chord</title>
    <meta name="application-name" content="Sephia Chord">
    <meta name="apple-mobile-web-app-title" content="Sephia Chord">
    <meta name="theme-color" content="#0f0c09">
    <link rel="icon" type="image/png" href="/assets/sephia-chord-logo.png">
    <link rel="apple-touch-icon" href="/assets/sephia-chord-logo.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section id="authView" class="auth-view" hidden>
        <div class="auth-bg-layer" aria-hidden="true"></div>
        <div class="auth-paint-layer" aria-hidden="true"></div>
        <div class="auth-unlock-logo" aria-hidden="true"></div>
        <form id="loginForm" class="panel">
          <div class="auth-logo" aria-label="Sephia Chord"></div>
          <div class="auth-brand">
            <span class="brand-mark brand-mark-large" aria-hidden="true"></span>
            <div>
              <p class="eyebrow">Private Planner</p>
              <h1>Sephia Chord</h1>
            </div>
          </div>
          <div class="pin-login">
            <input
              id="passwordInput"
              class="pin-input"
              type="password"
              inputmode="numeric"
              pattern="[0-9]{4}"
              minlength="4"
              maxlength="4"
              autocomplete="current-password"
              aria-label="Password"
              required
            >
            <div class="pin-dots" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="pin-keypad" aria-label="Number keypad">
              <button type="button" data-pin-key="1">1</button>
              <button type="button" data-pin-key="2">2</button>
              <button type="button" data-pin-key="3">3</button>
              <button type="button" data-pin-key="4">4</button>
              <button type="button" data-pin-key="5">5</button>
              <button type="button" data-pin-key="6">6</button>
              <button type="button" data-pin-key="7">7</button>
              <button type="button" data-pin-key="8">8</button>
              <button type="button" data-pin-key="9">9</button>
              <span></span>
              <button type="button" data-pin-key="0">0</button>
              <button type="button" data-pin-delete aria-label="Delete">⌫</button>
            </div>
          </div>
          <p id="authMessage" class="message"></p>
        </form>
      </section>

      <section id="appView" hidden>
        <header class="topbar">
          <div class="brand-lockup">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
              <h1 id="selectedDateLabel">Today</h1>
            </div>
          </div>
          <div class="top-actions">
            <button id="refreshButton" type="button" class="icon-button" title="Refresh">↻</button>
            <button id="logoutButton" type="button" class="icon-button" title="Log out">⏻</button>
          </div>
        </header>

        <section id="statusMessage" class="message"></section>

        <section id="todayTab" class="tab-view"></section>
        <section id="calendarTab" class="tab-view" hidden></section>
        <section id="emotionTab" class="tab-view" hidden></section>
        <section id="routinesTab" class="tab-view" hidden></section>

        <nav class="bottom-nav" aria-label="Main navigation">
          <button type="button" data-tab="today" class="active">Today</button>
          <button type="button" data-tab="calendar">Calendar</button>
          <button type="button" data-tab="emotion">Challenge</button>
          <button type="button" data-tab="routines">Routine</button>
        </nav>
      </section>
    </main>

    <dialog id="itemDialog">
      <button
        type="submit"
        id="itemDialogBackdrop"
        class="item-dialog-backdrop"
        aria-label="Cancel"
        data-dialog-action="cancel"
        form="itemForm"
        formmethod="dialog"
        formnovalidate
      ></button>
      <form id="itemForm" method="dialog" class="dialog-body item-dialog-body">
        <div class="dialog-header item-dialog-header">
          <button
            type="submit"
            id="closeDialogButton"
            class="dialog-text-button"
            data-dialog-action="cancel"
            formmethod="dialog"
            formnovalidate
          >Cancel</button>
          <h2 id="dialogTitle">Add</h2>
          <button type="submit" class="dialog-text-button primary-text">Save</button>
        </div>

        <input id="editingId" type="hidden">

        <label class="native-type-field">
          Type
          <select id="typeInput" required>
            <option value="일정">Event</option>
            <option value="할일">Task</option>
            <option value="루틴">Routine</option>
          </select>
        </label>

        <label class="title-field">
          <input id="titleInput" type="text" maxlength="80" placeholder="Add title" required>
        </label>

        <div class="type-segment" aria-label="Type">
          <button type="button" data-type-choice="일정">Event</button>
          <button type="button" data-type-choice="할일">Task</button>
          <button type="button" data-type-choice="루틴">Routine</button>
        </div>

        <div class="editor-card">
          <label id="allDayField" class="editor-row all-day-row">
            <span class="editor-icon" aria-hidden="true">◷</span>
            <span class="editor-label">All day</span>
            <span class="switch-control">
              <input id="allDayInput" type="checkbox">
              <span></span>
            </span>
          </label>

        <div id="dateFields" class="editor-date-fields">
          <div id="scheduleFields" class="editor-date-time-fields">
            <div class="editor-date-time-row start-date-time-row">
              <span class="editor-icon" aria-hidden="true">◷</span>
              <label class="date-editor-field">
                <span id="startDateLabel">Start date</span>
                <input id="dateInput" type="text" inputmode="none" readonly data-picker="date">
              </label>
              <label class="time-editor-field">
                <span id="startTimeLabel" class="time-editor-label">Time</span>
                <input id="startTimeInput" type="text" inputmode="none" readonly data-picker="time">
                <span id="startTimeDisplay" class="time-editor-value" aria-hidden="true"></span>
              </label>
            </div>
            <div id="endDateField" class="editor-date-time-row end-date-time-row">
              <span class="editor-icon" aria-hidden="true"></span>
              <label class="date-editor-field">
                <span id="endDateLabel">End date</span>
                <input id="endDateInput" type="text" inputmode="none" readonly data-picker="date">
              </label>
              <label class="time-editor-field">
                <span id="endTimeLabel" class="time-editor-label">Time</span>
                <input id="endTimeInput" type="text" inputmode="none" readonly data-picker="time">
                <span id="endTimeDisplay" class="time-editor-value" aria-hidden="true"></span>
              </label>
            </div>
          </div>
        </div>

        <div id="pickerPanel" class="picker-panel" hidden></div>
        </div>

        <div id="routineFields" class="editor-card">
          <p class="field-label">Repeat days</p>
          <div class="chips">
            <label><input type="checkbox" name="repeatDay" value="월">Mon</label>
            <label><input type="checkbox" name="repeatDay" value="화">Tue</label>
            <label><input type="checkbox" name="repeatDay" value="수">Wed</label>
            <label><input type="checkbox" name="repeatDay" value="목">Thu</label>
            <label><input type="checkbox" name="repeatDay" value="금">Fri</label>
            <label><input type="checkbox" name="repeatDay" value="토">Sat</label>
            <label><input type="checkbox" name="repeatDay" value="일">Sun</label>
          </div>
        </div>

        <label class="note-field">
          Note
          <textarea id="noteInput" rows="3" maxlength="2000"></textarea>
        </label>

        <div class="dialog-actions">
          <button type="button" id="deleteButton" class="danger" hidden>Delete</button>
        </div>
      </form>
    </dialog>

    <dialog id="emotionDialog">
      <div class="dialog-body">
        <div class="dialog-header">
          <h2 id="emotionDialogTitle">Challenge</h2>
          <button type="button" id="closeEmotionDialogButton" class="icon-button dialog-close-button" title="Close">×</button>
        </div>
        <div id="emotionDialogContent" class="emotion-dialog-content"></div>
      </div>
    </dialog>

    <dialog id="calendarTimelineDialog" class="calendar-timeline-dialog">
      <div class="dialog-body">
        <div class="dialog-header">
          <h2 id="calendarTimelineTitle">Timeline</h2>
          <button type="button" id="closeCalendarTimelineDialogButton" class="icon-button dialog-close-button" title="Close">×</button>
        </div>
        <div id="calendarTimelineContent" class="calendar-timeline-content"></div>
      </div>
    </dialog>

    <dialog id="logoutMoodDialog" class="logout-mood-dialog">
      <div class="dialog-body">
        <div class="dialog-header">
          <h2>Today's Mood</h2>
          <button type="button" id="closeLogoutMoodDialogButton" class="icon-button dialog-close-button" title="Close">×</button>
        </div>
        <p class="logout-mood-copy">Choose a color for your next login.</p>
        <div id="logoutMoodContent" class="logout-mood-content"></div>
      </div>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
