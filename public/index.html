<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Sephia Chord</title>
    <meta name="application-name" content="Sephia Chord">
    <meta name="apple-mobile-web-app-title" content="Sephia Chord">
    <meta name="theme-color" content="#0f0c09">
    <link rel="icon" type="image/png" href="/assets/sephia-chord-logo.png">
    <link rel="apple-touch-icon" href="/assets/sephia-chord-logo.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section id="authView" class="auth-view" hidden>
        <form id="loginForm" class="panel">
          <div class="auth-logo" aria-label="Sephia Chord"></div>
          <div class="auth-brand">
            <span class="brand-mark brand-mark-large" aria-hidden="true"></span>
            <div>
              <p class="eyebrow">개인 플래너</p>
              <h1>Sephia Chord</h1>
            </div>
          </div>
          <div class="pin-login">
            <input
              id="passwordInput"
              class="pin-input"
              type="password"
              inputmode="numeric"
              pattern="[0-9]{4}"
              minlength="4"
              maxlength="4"
              autocomplete="current-password"
              aria-label="비밀번호"
              required
            >
            <div class="pin-dots" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="pin-keypad" aria-label="숫자 키패드">
              <button type="button" data-pin-key="1">1</button>
              <button type="button" data-pin-key="2">2</button>
              <button type="button" data-pin-key="3">3</button>
              <button type="button" data-pin-key="4">4</button>
              <button type="button" data-pin-key="5">5</button>
              <button type="button" data-pin-key="6">6</button>
              <button type="button" data-pin-key="7">7</button>
              <button type="button" data-pin-key="8">8</button>
              <button type="button" data-pin-key="9">9</button>
              <span></span>
              <button type="button" data-pin-key="0">0</button>
              <button type="button" data-pin-delete aria-label="삭제">⌫</button>
            </div>
          </div>
          <p id="authMessage" class="message"></p>
        </form>
      </section>

      <section id="appView" hidden>
        <header class="topbar">
          <div class="brand-lockup">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
              <h1 id="selectedDateLabel">오늘</h1>
            </div>
          </div>
          <div class="top-actions">
            <button id="refreshButton" type="button" class="icon-button" title="새로고침">↻</button>
            <button id="logoutButton" type="button" class="icon-button" title="로그아웃">⌁</button>
          </div>
        </header>

        <section id="statusMessage" class="message"></section>

        <section id="todayTab" class="tab-view"></section>
        <section id="calendarTab" class="tab-view" hidden></section>
        <section id="emotionTab" class="tab-view" hidden></section>
        <section id="routinesTab" class="tab-view" hidden></section>

        <nav class="bottom-nav" aria-label="주 메뉴">
          <button type="button" data-tab="today" class="active">오늘</button>
          <button type="button" data-tab="calendar">캘린더</button>
          <button type="button" data-tab="emotion">챌린지</button>
          <button type="button" data-tab="routines">루틴</button>
        </nav>
      </section>
    </main>

    <dialog id="itemDialog">
      <form id="itemForm" method="dialog" class="dialog-body item-dialog-body">
        <div class="dialog-header item-dialog-header">
          <button type="button" id="closeDialogButton" class="dialog-text-button">취소</button>
          <h2 id="dialogTitle">추가</h2>
          <button type="submit" class="dialog-text-button primary-text">저장</button>
        </div>

        <input id="editingId" type="hidden">

        <label class="native-type-field">
          유형
          <select id="typeInput" required>
            <option value="일정">일정</option>
            <option value="할일">할일</option>
            <option value="루틴">루틴</option>
          </select>
        </label>

        <label class="title-field">
          <input id="titleInput" type="text" maxlength="80" placeholder="제목 추가" required>
        </label>

        <div class="type-segment" aria-label="유형">
          <button type="button" data-type-choice="일정">일정</button>
          <button type="button" data-type-choice="할일">할 일</button>
          <button type="button" data-type-choice="루틴">루틴</button>
        </div>

        <div class="editor-card">
          <label id="allDayField" class="editor-row all-day-row">
            <span class="editor-icon" aria-hidden="true">◷</span>
            <span class="editor-label">종일</span>
            <span class="switch-control">
              <input id="allDayInput" type="checkbox">
              <span></span>
            </span>
          </label>

        <div id="dateFields" class="editor-date-fields">
          <div id="scheduleFields" class="editor-date-time-fields">
            <div class="editor-date-time-row start-date-time-row">
              <span class="editor-icon" aria-hidden="true">◷</span>
              <label class="date-editor-field">
                <span id="startDateLabel">시작일</span>
                <input id="dateInput" type="text" inputmode="none" readonly data-picker="date">
              </label>
              <label class="time-editor-field">
                <span id="startTimeLabel" class="time-editor-label">시간선택</span>
                <input id="startTimeInput" type="text" inputmode="none" readonly data-picker="time">
                <span id="startTimeDisplay" class="time-editor-value" aria-hidden="true"></span>
              </label>
            </div>
            <div id="endDateField" class="editor-date-time-row end-date-time-row">
              <span class="editor-icon" aria-hidden="true"></span>
              <label class="date-editor-field">
                <span id="endDateLabel">마감일</span>
                <input id="endDateInput" type="text" inputmode="none" readonly data-picker="date">
              </label>
              <label class="time-editor-field">
                <span id="endTimeLabel" class="time-editor-label">시간선택</span>
                <input id="endTimeInput" type="text" inputmode="none" readonly data-picker="time">
                <span id="endTimeDisplay" class="time-editor-value" aria-hidden="true"></span>
              </label>
            </div>
          </div>
        </div>

        <div id="pickerPanel" class="picker-panel" hidden></div>
        </div>

        <div id="routineFields" class="editor-card">
          <p class="field-label">반복요일</p>
          <div class="chips">
            <label><input type="checkbox" name="repeatDay" value="월">월</label>
            <label><input type="checkbox" name="repeatDay" value="화">화</label>
            <label><input type="checkbox" name="repeatDay" value="수">수</label>
            <label><input type="checkbox" name="repeatDay" value="목">목</label>
            <label><input type="checkbox" name="repeatDay" value="금">금</label>
            <label><input type="checkbox" name="repeatDay" value="토">토</label>
            <label><input type="checkbox" name="repeatDay" value="일">일</label>
          </div>
        </div>

        <label class="note-field">
          메모
          <textarea id="noteInput" rows="3" maxlength="2000"></textarea>
        </label>

        <div class="dialog-actions">
          <button type="button" id="deleteButton" class="danger" hidden>삭제</button>
        </div>
      </form>
    </dialog>

    <dialog id="emotionDialog">
      <div class="dialog-body">
        <div class="dialog-header">
          <h2 id="emotionDialogTitle">챌린지</h2>
          <button type="button" id="closeEmotionDialogButton" class="icon-button dialog-close-button" title="닫기">×</button>
        </div>
        <div id="emotionDialogContent" class="emotion-dialog-content"></div>
      </div>
    </dialog>

    <dialog id="calendarTimelineDialog" class="calendar-timeline-dialog">
      <div class="dialog-body">
        <div class="dialog-header">
          <h2 id="calendarTimelineTitle">시간표</h2>
          <button type="button" id="closeCalendarTimelineDialogButton" class="icon-button dialog-close-button" title="닫기">×</button>
        </div>
        <div id="calendarTimelineContent" class="calendar-timeline-content"></div>
      </div>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
